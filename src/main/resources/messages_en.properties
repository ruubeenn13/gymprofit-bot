# --- Pinned help messages (posted by /setup) ---
intro.empieza.titulo=Start here!
intro.empieza.desc=ЁЯСЛ Welcome to **GymProFit**, your gamified fitness community!\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\nFollow these steps to get started:\n\n**1я╕ПтГг ┬╖ Read the rules** тЖТ ЁЯУЬ rules\n**2я╕ПтГг ┬╖ Learn the bot** тЖТ ЁЯЧ║я╕П how-it-works (XP, levels and commands)\n**3я╕ПтГг ┬╖ Grab your roles** тЖТ ЁЯОн roles (goal + notifications)\n**4я╕ПтГг ┬╖ Introduce yourself** тЖТ ЁЯСЛ introductions\n**5я╕ПтГг ┬╖ Join in** тЖТ ЁЯТм general ┬╖ commands in ЁЯдЦ bot-commands\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\nЁЯТк You earn **XP** just by taking part and level up. Glad to have you here!
intro.reglas.titulo=Community rules
intro.reglas.desc=To keep this a good place for everyone, follow these rules. By taking part, you accept them.\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\n**ЁЯдЭ Respect**\n> **1.** Always be respectful. No insults, harassment, racism, homophobia or body-shaming.\n> **2.** No drama, baiting or mention spam.\n\n**ЁЯз╣ Content**\n> **3.** No spam, ads or self-promo without staff permission.\n> **4.** No NSFW, gore, illegal content or anything promoting dangerous habits.\n> **5.** Use each channel for its topic (see ЁЯЧ║я╕П how-it-works).\n\n**ЁЯеЧ Health & fitness**\n> **6.** This is **not** a substitute for a doctor or professional. No fad diets or substances.\n> **7.** We motivate, we do not judge: respect everyone's level and body.\n\n**ЁЯФТ Safety**\n> **8.** Do not share personal data, yours or others'.\n> **9.** Do not impersonate anyone or the staff.\n\n**ЁЯЫбя╕П Staff**\n> **10.** Follow staff instructions.\n> **11.** Got an issue? Open a ticket in ЁЯОл support; do not make a scene in public.\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\nтЪая╕П Breaking the rules can lead to **warning тЖТ temporary mute тЖТ kick or ban**, depending on severity. ЁЯТк
intro.como.titulo=How GymProBot works
intro.como.desc=**GymProBot** makes the community more fun. Here is what you can do:\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\n**тнР XP and levels**\n> Earn XP by chatting (once per minute). Check your level with `/nivel` and compete in `/top`.\n\n**ЁЯОп Goals and roles**\n> Grab your goal (ЁЯТк Strength ┬╖ ЁЯПГ Cardio ┬╖ тЪЦя╕П Weight loss ┬╖ ЁЯМЯ General) in ЁЯОн roles or in the welcome.\n\n**ЁЯФФ Notifications**\n> Enable ЁЯУг Announcements and ЁЯОп Challenges in ЁЯОн roles so you do not miss a thing.\n\n**ЁЯдЦ Commands**\n> Type `/` to see them all. Use them in ЁЯдЦ bot-commands to keep the rest clean.\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\nЁЯФЬ Coming soon: quote and exercise of the day, trivia, challenges, economy and much more.
intro.faq.titulo=Frequently asked questions
intro.faq.desc=**тЭУ How do I level up?**\n> By chatting: you earn XP every minute of activity. Check it with `/nivel`.\n\n**тЭУ How do I grab or change my goal?**\n> In ЁЯОн roles or in ЁЯСЛ welcome.\n\n**тЭУ Does the bot speak my language?**\n> Yes: it replies in Spanish or English based on your Discord client.\n\n**тЭУ How do I contact the staff?**\n> Open a ticket in ЁЯОл support.\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\nStill have a question? Ask in ЁЯТм general or тЭУ questions.
intro.redes.titulo=Our socials
intro.redes.desc=ЁЯУ▒ Follow us so you do not miss a thing.\n\n*(Staff will post the official GymProFit and team socials here.)*
intro.general.titulo=General chat
intro.general.desc=ЁЯТм The community's main chat. Introduce yourself, share your day and meet people.\n\nGood vibes always. Bot commands work best in ЁЯдЦ bot-commands. ЁЯТк
intro.presentaciones.titulo=Introduce yourself
intro.presentaciones.desc=ЁЯСЛ Tell us who you are! An easy format:\n\n**Name/nickname:**\n**Goal:** (strength, cardio, weight loss, general)\n**Time training:**\n**Something about you:**\n\nAnd welcome whoever comes after you! ЁЯдЭ
intro.comandos.titulo=Bot commands
intro.comandos.desc=ЁЯдЦ Use bot commands here to keep other channels clean.\n\nTry /nivel and /top, and type / to see everything. There is a small slowmode to keep things tidy.
intro.soporte.titulo=Support
intro.soporte.desc=ЁЯОл Need help or to talk to the staff privately?\n\nSoon you will be able to open a **ticket** here with a button. Meanwhile, describe your issue and the staff will help you.
intro.anuncios.titulo=Announcements
intro.anuncios.desc=ЁЯУг Important server and GymProFit news goes here. Grab the ЁЯУг Avisos role in ЁЯОн roles so you do not miss a thing.
intro.eventos.titulo=Events
intro.eventos.desc=ЁЯУЕ Meetups, live streams, live challenges and special community events. Grab the ЁЯУЕ Eventos role in ЁЯОн roles (or during onboarding) so we can ping you for each one.
intro.sorteos.titulo=Giveaways
intro.sorteos.desc=ЁЯОБ Giveaways and prizes for the community. Grab the ЁЯОБ Sorteos role in ЁЯОн roles (or during onboarding) so you never miss one. Each giveaway explains how to enter.
intro.progresos.titulo=Share your progress
intro.progresos.desc=ЁЯУИ Post your progress, PRs and wins. Mutual support motivates. No judging or comparing!
intro.nutricion.titulo=Nutrition
intro.nutricion.desc=ЁЯНО Food questions, recipes and ideas. Remember: this is not a substitute for a professional.
intro.rutinas.titulo=Routines
intro.rutinas.desc=ЁЯУЪ Share and discuss training routines. State your level and goal so it helps others.
intro.dudas.titulo=Questions
intro.dudas.desc=тЭУ Ask anything about training or nutrition. The community and staff will help.
intro.proximamente.titulo=Coming soon
intro.proximamente.desc=ЁЯФТ This channel will unlock in an upcoming GymProBot phase. Very soon! ЁЯТк
intro.simulador.titulo=ЁЯОо Life simulator тАФ How to play
intro.simulador.desc=Welcome to the GymProFit **life simulator**: a **fiction** RPG where you build a life on the server. Everything runs on **virtual coins** (no real-world value, not buyable with money).\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\n**ЁЯзН Your character**\n> You have attributes (ЁЯТк Strength, ЁЯПГ Stamina, ЁЯЧгя╕П Charisma), тЪб energy and тЭдя╕П health. Check it with **/perfil**.\n\n**ЁЯкЩ Money**\n> Earn coins with **/daily** (daily reward, builds your streak), working and playing. Check your balance with **/balance**.\n\n**ЁЯФЬ Coming (in phases)**\n> ЁЯТ╝ Pick a **job** and work (`/work`) ┬╖ ЁЯЫТ **shop** of items with effects ┬╖ ЁЯТ╣ player **market** ┬╖ ЁЯПж **bank** ┬╖ ЁЯП░ **guilds** and alliances ┬╖ ЁЯО░ games of chance.\nтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ\nЁЯРв **Slow progression on purpose:** growing takes effort. No getting rich in an afternoon; the fun is the long game.
intro.economia.titulo=ЁЯТ░ Economy
intro.economia.desc=Live your life on the server here. Commands available now:\n> **/perfil** тАФ your character (attributes, energy, health) and balance.\n> **/daily** тАФ claim your daily reward and build your streak.\n> **/balance** тАФ check your coins.\n\nMore commands (work, shop, marketтАж) will arrive in phases. Everything is explained in ЁЯУЦ c├│mo-jugar.

