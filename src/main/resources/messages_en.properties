# ============================================================
# Bot user-facing texts in ENGLISH.
# Every user-visible string lives here; never hardcode text in Java (SPEC §8).
# Each key must also exist in messages_es.properties (review-checklist).
# Empty during scaffolding; filled in by phases (F1 onwards).
# ============================================================

# --- Bot / presence ---
# Global activity status of the bot (single string; Discord does not localize it per user).
bot.actividad=keeping the gym strong 💪

# --- Embeds ---
# Brand footer present on every embed (SPEC §7 rule 3).
embed.footer=GymProBot • GymProFit

# --- Commands: shared ---
comando.error.generico=Something went wrong running the command. Please try again in a moment.

# --- /ping command ---
comando.ping.descripcion=Check that the bot is responsive and show its latency
comando.ping.titulo=Pong
comando.ping.latencia=Gateway latency: {0} ms

# --- /nivel (level) command ---
comando.nivel.descripcion=Show your level and XP (or another user's)
