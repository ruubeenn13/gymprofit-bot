# --- Pinned help messages (posted by /setup) ---
intro.empieza.titulo=Start here!
intro.empieza.desc=👋 Welcome to **GymProFit**, your gamified fitness community!\n━━━━━━━━━━━━━━━━━━━━\nFollow these steps to get started:\n\n**1️⃣ · Read the rules** → 📜 rules\n**2️⃣ · Learn the bot** → 🗺️ how-it-works (XP, levels and commands)\n**3️⃣ · Grab your roles** → 🎭 roles (goal + notifications)\n**4️⃣ · Introduce yourself** → 👋 introductions\n**5️⃣ · Join in** → 💬 general · commands in 🤖 bot-commands\n━━━━━━━━━━━━━━━━━━━━\n💪 You earn **XP** just by taking part and level up. Glad to have you here!
intro.reglas.titulo=Community rules
intro.reglas.desc=To keep this a good place for everyone, follow these rules. By taking part, you accept them.\n━━━━━━━━━━━━━━━━━━━━\n**🤝 Respect**\n> **1.** Always be respectful. No insults, harassment, racism, homophobia or body-shaming.\n> **2.** No drama, baiting or mention spam.\n\n**🧹 Content**\n> **3.** No spam, ads or self-promo without staff permission.\n> **4.** No NSFW, gore, illegal content or anything promoting dangerous habits.\n> **5.** Use each channel for its topic (see 🗺️ how-it-works).\n\n**🥗 Health & fitness**\n> **6.** This is **not** a substitute for a doctor or professional. No fad diets or substances.\n> **7.** We motivate, we do not judge: respect everyone's level and body.\n\n**🔒 Safety**\n> **8.** Do not share personal data, yours or others'.\n> **9.** Do not impersonate anyone or the staff.\n\n**🛡️ Staff**\n> **10.** Follow staff instructions.\n> **11.** Got an issue? Open a ticket in 🎫 support; do not make a scene in public.\n━━━━━━━━━━━━━━━━━━━━\n⚠️ Breaking the rules can lead to **warning → temporary mute → kick or ban**, depending on severity. 💪
intro.como.titulo=How GymProBot works
intro.como.desc=**GymProBot** makes the community more fun. Here is what you can do:\n━━━━━━━━━━━━━━━━━━━━\n**⭐ XP and levels**\n> Earn XP by chatting (once per minute). Check your level with `/nivel` and compete in `/top`.\n\n**🎯 Goals and roles**\n> Grab your goal (💪 Strength · 🏃 Cardio · ⚖️ Weight loss · 🌟 General) in 🎭 roles or in the welcome.\n\n**🔔 Notifications**\n> Enable 📣 Announcements and 🎯 Challenges in 🎭 roles so you do not miss a thing.\n\n**🤖 Commands**\n> Type `/` to see them all. Use them in 🤖 bot-commands to keep the rest clean.\n━━━━━━━━━━━━━━━━━━━━\n🔜 Coming soon: quote and exercise of the day, trivia, challenges, economy and much more.
intro.faq.titulo=Frequently asked questions
intro.faq.desc=**❓ How do I level up?**\n> By chatting: you earn XP every minute of activity. Check it with `/nivel`.\n\n**❓ How do I grab or change my goal?**\n> In 🎭 roles or in 👋 welcome.\n\n**❓ Does the bot speak my language?**\n> Yes: it replies in Spanish or English based on your Discord client.\n\n**❓ How do I contact the staff?**\n> Open a ticket in 🎫 support.\n━━━━━━━━━━━━━━━━━━━━\nStill have a question? Ask in 💬 general or ❓ questions.
intro.redes.titulo=Our socials
intro.redes.desc=📱 Follow us so you do not miss a thing.\n\n*(Staff will post the official GymProFit and team socials here.)*
intro.general.titulo=General chat
intro.general.desc=💬 The community's main chat. Introduce yourself, share your day and meet people.\n\nGood vibes always. Bot commands work best in 🤖 bot-commands. 💪
intro.presentaciones.titulo=Introduce yourself
intro.presentaciones.desc=👋 Tell us who you are! An easy format:\n\n**Name/nickname:**\n**Goal:** (strength, cardio, weight loss, general)\n**Time training:**\n**Something about you:**\n\nAnd welcome whoever comes after you! 🤝
intro.comandos.titulo=Bot commands
intro.comandos.desc=🤖 Use bot commands here to keep other channels clean.\n\nTry /nivel and /top, and type / to see everything. There is a small slowmode to keep things tidy.
intro.soporte.titulo=Support
intro.soporte.desc=🎫 Need help or to talk to the staff privately?\n\nSoon you will be able to open a **ticket** here with a button. Meanwhile, describe your issue and the staff will help you.
intro.anuncios.titulo=Announcements
intro.anuncios.desc=📣 Important server and GymProFit news goes here. Grab the 📣 Avisos role in 🎭 roles so you do not miss a thing.
intro.eventos.titulo=Events
intro.eventos.desc=📅 Meetups, live streams, live challenges and special community events. Grab the 📅 Eventos role in 🎭 roles (or during onboarding) so we can ping you for each one.
intro.sorteos.titulo=Giveaways
intro.sorteos.desc=🎁 Giveaways and prizes for the community. Grab the 🎁 Sorteos role in 🎭 roles (or during onboarding) so you never miss one. Each giveaway explains how to enter.
intro.progresos.titulo=Share your progress
intro.progresos.desc=📈 Post your progress, PRs and wins. Mutual support motivates. No judging or comparing!
intro.nutricion.titulo=Nutrition
intro.nutricion.desc=🍎 Food questions, recipes and ideas. Remember: this is not a substitute for a professional.
intro.rutinas.titulo=Routines
intro.rutinas.desc=📚 Share and discuss training routines. State your level and goal so it helps others.
intro.dudas.titulo=Questions
intro.dudas.desc=❓ Ask anything about training or nutrition. The community and staff will help.
intro.proximamente.titulo=Coming soon
intro.proximamente.desc=🔒 This channel will unlock in an upcoming GymProBot phase. Very soon! 💪
intro.simulador.titulo=🎮 Life simulator — How to play
intro.simulador.desc=Welcome to the GymProFit **life simulator**: a **fiction** RPG where you build a life on the server. Everything runs on **virtual coins** (no real-world value, not buyable with money).\n━━━━━━━━━━━━━━━━━━━━\n**🧍 Character & progression**\n> Attributes (💪🏃🗣️), ⚡ energy and ❤️ health. **/perfil ver** · **/perfil balance** · **/perfil insignias** · **/rank** · **/daily** · **/entrenar** · **/estudiar** · **/descansar**.\n**😴 Rest**\n> Energy comes back by **sleeping**: **/descansar dormir** · **/descansar despertar** · **/descansar estado**. A better bed means a better rest (on the floor you never reach 100).\n**💼 Work & shop**\n> **/trabajo lista** · **/trabajo elegir** · **/trabajo currar** · **/tienda** · **/comprar** · **/inventario ver** · **/inventario usar** · **/inventario vender** · **/mejoras**.\n**⚔️ Combat**\n> **/mundos** · **/monstruos** · **/pelear** · **/mazmorra** · **/misiones** · **/equipar** · **/encantar**.\n**⛏️ Mining & smithing**\n> **/minar** · **/reparar** · **/recetas** · **/craftear**.\n**🎁🤝 Chests & players**\n> **/cofres** · **/abrir** · **/regalar** · **/trueque** · **/robar** · **/mercado**.\n**🏦🎰📈 Banking & gambling** (fiction)\n> **/banco** · **/casino** · **/bolsa**.\n**🏰 Social**\n> **/gremio** (groups with a private channel).\n━━━━━━━━━━━━━━━━━━━━\n🐢 **Slow progression on purpose:** growing takes effort. The fun is the long game. Start in 💰・economía.
intro.economia.titulo=💰 Economy
intro.economia.desc=Live your life on the server here. Commands:\n**👤 Character**\n> `/perfil ver` · `/perfil balance` · `/perfil insignias` · `/daily` (daily reward + streak) · `/rank` (card)\n**😴 Rest**\n> `/descansar dormir` · `/descansar despertar` · `/descansar estado` — energy comes back by sleeping; a better bed (sleeping bag, mattress, flat, house… or a hotel) rests you more. 24 h without sleep: fatigue\n**💼 Work**\n> `/trabajo lista` · `/trabajo elegir` · `/trabajo currar` · `/entrenar` (stats) · `/estudiar` (salary bonus)\n**🛒 Shop**\n> `/tienda` · `/comprar` · `/inventario ver` · `/inventario usar` · `/inventario vender`\n**🌳 Upgrades**\n> `/mejoras` (tree) · `/mejorar`\n**⛏️ Mining & smithing**\n> `/minar` · `/reparar` · `/craftear` · `/recetas`\n**🎁 Chests**\n> `/cofres` (drop rates) · `/abrir`\n**🤝 Between players**\n> `/regalar` · `/regalar-item` · `/trueque` · `/robar` · `/mercado ver` · `/mercado publicar` · `/mercado comprar` · `/mercado retirar`\n**🏦 Bank**\n> `/banco ver` · `/banco depositar` · `/banco retirar` · `/banco prestamo` · `/banco pagar`\n**🏰 Guilds**\n> `/gremio crear` · `/gremio ver` · `/gremio add` · `/gremio kick` · `/gremio salir` · `/gremio disolver`\n**🎰 Casino** (fiction)\n> `/casino coinflip` · `/casino dado` · `/casino ruleta` · `/casino duelo`\n**📈 Market** (fiction)\n> `/bolsa ver` · `/bolsa invertir` · `/bolsa vender` · `/bolsa cartera`\n**⚔️ Adventure**\n> `/equipar` · `/mundos` · `/monstruos` · `/pelear` · `/mazmorra` · `/misiones` (see ⚔️・combate)

