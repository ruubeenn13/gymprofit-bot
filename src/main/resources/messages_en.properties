intro.combate.desc=Gear up for adventure.\n**вЪФпЄП Equipment**\n> `/equipar <item>` ¬Ј `/desequipar <slot>` вАФ your combat power shows in `/perfil`.\n**рЯЧЇпЄП Worlds**\n> `/mundos` вАФ check your progress; beat a world's boss to open the next.\n**рЯУЦ Bestiary**\n> `/monstruos <world>` вАФ every monster by difficulty, with power, HP, rewards and loot.\n**вЪФпЄП Fight**\n> `/pelear <world>` вАФ turn-based battle: pick a rival and fight with buttons (Attack/Defend/Skill/Item/Flee).\n**рЯП∞ Dungeons**\n> `/mazmorra <dungeon>` вАФ waves of monsters + boss, no healing between them; bonus on clear.\n**рЯОѓ Missions**\n> `/misiones` вАФ hunt objectives that complete as you fight (reward on victory).

