# --- Pinned help messages (posted by /setup) ---
intro.empieza.titulo=Start here!
intro.empieza.desc=рЯСЛ Welcome to **GymProFit**, your gamified fitness community!\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\nFollow these steps to get started:\n\n**1пЄПвГ£ ¬Ј Read the rules** вЖТ рЯУЬ rules\n**2пЄПвГ£ ¬Ј Learn the bot** вЖТ рЯЧЇпЄП how-it-works (XP, levels and commands)\n**3пЄПвГ£ ¬Ј Grab your roles** вЖТ рЯО≠ roles (goal + notifications)\n**4пЄПвГ£ ¬Ј Introduce yourself** вЖТ рЯСЛ introductions\n**5пЄПвГ£ ¬Ј Join in** вЖТ рЯТђ general ¬Ј commands in рЯ§Ц bot-commands\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\nрЯТ™ You earn **XP** just by taking part and level up. Glad to have you here!
intro.reglas.titulo=Community rules
intro.reglas.desc=To keep this a good place for everyone, follow these rules. By taking part, you accept them.\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\n**рЯ§Э Respect**\n> **1.** Always be respectful. No insults, harassment, racism, homophobia or body-shaming.\n> **2.** No drama, baiting or mention spam.\n\n**рЯІє Content**\n> **3.** No spam, ads or self-promo without staff permission.\n> **4.** No NSFW, gore, illegal content or anything promoting dangerous habits.\n> **5.** Use each channel for its topic (see рЯЧЇпЄП how-it-works).\n\n**рЯ•Ч Health & fitness**\n> **6.** This is **not** a substitute for a doctor or professional. No fad diets or substances.\n> **7.** We motivate, we do not judge: respect everyone's level and body.\n\n**рЯФТ Safety**\n> **8.** Do not share personal data, yours or others'.\n> **9.** Do not impersonate anyone or the staff.\n\n**рЯЫ°пЄП Staff**\n> **10.** Follow staff instructions.\n> **11.** Got an issue? Open a ticket in рЯОЂ support; do not make a scene in public.\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\nвЪ†пЄП Breaking the rules can lead to **warning вЖТ temporary mute вЖТ kick or ban**, depending on severity. рЯТ™
intro.como.titulo=How GymProBot works
intro.como.desc=**GymProBot** makes the community more fun. Here is what you can do:\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\n**в≠Р XP and levels**\n> Earn XP by chatting (once per minute). Check your level with `/nivel` and compete in `/top`.\n\n**рЯОѓ Goals and roles**\n> Grab your goal (рЯТ™ Strength ¬Ј рЯПГ Cardio ¬Ј вЪЦпЄП Weight loss ¬Ј рЯМЯ General) in рЯО≠ roles or in the welcome.\n\n**рЯТ∞ Life simulator**\n> A fiction RPG with virtual coins: work, shop, combat, mining, banking and guilds. Start in рЯТ∞гГїeconomy with `/daily` and `/perfil ver`.\n\n**рЯПЛпЄП App exercises**\n> `/ejercicios` opens the real GymProFit catalog with filters and cards, and `/ejercicio-dia` gives you today's exercise (the bot posts it every morning in рЯЧУпЄП ejercicio-del-d√≠a).\n\n**рЯТђ Motivation**\n> `/frase` drops a random motivational quote, in your language, whenever you need one.\n\n**рЯФФ Notifications**\n> Enable рЯУ£ Announcements and рЯОѓ Challenges in рЯО≠ roles so you do not miss a thing.\n\n**рЯ§Ц Commands**\n> Type `/` to see them all. Use them in рЯ§Ц bot-commands to keep the rest clean.\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\nрЯФЬ Coming soon: trivia and linking your GymProFit account.
intro.faq.titulo=Frequently asked questions
intro.faq.desc=**вЭУ How do I level up?**\n> By chatting: you earn XP every minute of activity. Check it with `/nivel`.\n\n**вЭУ How do I grab or change my goal?**\n> In рЯО≠ roles or in рЯСЛ welcome.\n\n**вЭУ Does the bot speak my language?**\n> Yes: it replies in Spanish or English based on your Discord client.\n\n**вЭУ How do I contact the staff?**\n> Open a ticket in рЯОЂ support.\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\nStill have a question? Ask in рЯТђ general or вЭУ questions.
intro.redes.titulo=Our socials
intro.redes.desc=рЯУ± Follow us so you do not miss a thing.\n\n*(Staff will post the official GymProFit and team socials here.)*
intro.general.titulo=General chat
intro.general.desc=рЯТђ The community's main chat. Introduce yourself, share your day and meet people.\n\nGood vibes always. Bot commands work best in рЯ§Ц bot-commands. рЯТ™
intro.presentaciones.titulo=Introduce yourself
intro.presentaciones.desc=рЯСЛ Tell us who you are! An easy format:\n\n**Name/nickname:**\n**Goal:** (strength, cardio, weight loss, general)\n**Time training:**\n**Something about you:**\n\nAnd welcome whoever comes after you! рЯ§Э
intro.ejerciciodia.titulo=Exercise of the day
intro.ejerciciodia.desc=рЯЧУпЄП Every morning at **8:00** the bot posts an exercise from the real GymProFit catalog here, with its full card and a quote to start the day.\n\nBeat the bot to it or want it again? Use `/ejercicio-dia`. To browse the whole catalog: `/ejercicios` in рЯ§Ц comandos-bot.
intro.comandos.titulo=Bot commands
intro.comandos.desc=рЯ§Ц Use bot commands here to keep other channels clean.\n\nTry `/nivel`, `/top`, `/ejercicios`, `/ejercicio-dia`, `/frase` and `/perfil ver`, and type `/` to see them all. There is a small slowmode to keep things tidy.
intro.soporte.titulo=Support
intro.soporte.desc=рЯОЂ Need help or to talk to the staff privately?\n\nOpen a **ticket** with the button on the panel: it creates a private channel between you and the staff, and the transcript is saved when it is closed. If you cannot see the panel, ping a moderator.\n\nрЯУІ For non-Discord matters, email us at **gymprofit.soporte@gmail.com**.
intro.anuncios.titulo=Announcements
intro.anuncios.desc=рЯУ£ Important server and GymProFit news goes here. Grab the рЯУ£ Avisos role in рЯО≠ roles so you do not miss a thing.
intro.eventos.titulo=Events
intro.eventos.desc=рЯУЕ Meetups, live streams, live challenges and special community events. Grab the рЯУЕ Eventos role in рЯО≠ roles (or during onboarding) so we can ping you for each one.
intro.sorteos.titulo=Giveaways
intro.sorteos.desc=рЯОБ Giveaways and prizes for the community. Grab the рЯОБ Sorteos role in рЯО≠ roles (or during onboarding) so you never miss one. Each giveaway explains how to enter.
intro.progresos.titulo=Share your progress
intro.progresos.desc=рЯУИ Post your progress, PRs and wins. Mutual support motivates. No judging or comparing!
intro.nutricion.titulo=Nutrition
intro.nutricion.desc=рЯНО Food questions, recipes and ideas. Remember: this is not a substitute for a professional.
intro.rutinas.titulo=Routines
intro.rutinas.desc=рЯУЪ Share and discuss training routines. State your level and goal so it helps others.
intro.dudas.titulo=Questions
intro.dudas.desc=вЭУ Ask anything about training or nutrition. The community and staff will help.
intro.proximamente.titulo=Coming soon
intro.proximamente.desc=рЯФТ This channel will unlock in an upcoming GymProBot phase. Very soon! рЯТ™
intro.simulador.titulo=рЯОЃ Life simulator вАФ How to play
intro.simulador.desc=Welcome to the GymProFit **life simulator**: a **fiction** RPG where you build a life on the server. Everything runs on **virtual coins** (no real-world value, not buyable with money).\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\n**рЯІН Character & progression**\n> Attributes (рЯТ™рЯПГрЯЧ£пЄП), вЪ° energy and вЭ§пЄП health. **/perfil ver** ¬Ј **/perfil balance** ¬Ј **/perfil insignias** ¬Ј **/rank** ¬Ј **/daily** ¬Ј **/entrenar** ¬Ј **/estudiar** ¬Ј **/descansar**.\n**рЯШі Rest**\n> Energy comes back by **sleeping**: **/descansar dormir** ¬Ј **/descansar despertar** ¬Ј **/descansar estado**. A better bed means a better rest (on the floor you never reach 100).\n**рЯТЉ Work & shop**\n> **/trabajo lista** ¬Ј **/trabajo elegir** ¬Ј **/trabajo currar** ¬Ј **/tienda** ¬Ј **/comprar** ¬Ј **/inventario ver** ¬Ј **/inventario usar** ¬Ј **/inventario vender** ¬Ј **/mejoras**.\n**вЪФпЄП Combat**\n> **/mundos** ¬Ј **/monstruos** ¬Ј **/pelear** ¬Ј **/mazmorra** ¬Ј **/misiones** ¬Ј **/equipar** ¬Ј **/encantar**.\n**вЫПпЄП Mining & smithing**\n> **/minar** ¬Ј **/reparar** ¬Ј **/recetas** ¬Ј **/craftear**.\n**рЯОБрЯ§Э Chests & players**\n> **/cofres** ¬Ј **/abrir** ¬Ј **/regalar** ¬Ј **/trueque** ¬Ј **/robar** ¬Ј **/mercado**.\n**рЯП¶рЯО∞рЯУИ Banking & gambling** (fiction)\n> **/banco** ¬Ј **/casino** ¬Ј **/bolsa**.\n**рЯП∞ Social**\n> **/gremio** (groups with a private channel).\nвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ\nрЯРҐ **Slow progression on purpose:** growing takes effort. The fun is the long game. Start in рЯТ∞гГїeconom√≠a.
intro.economia.titulo=рЯТ∞ Economy
intro.economia.desc=Live your life on the server here. Commands:\n**рЯС§ Character**\n> `/perfil ver` ¬Ј `/perfil balance` ¬Ј `/perfil insignias` ¬Ј `/daily` (daily reward + streak) ¬Ј `/rank` (card)\n**рЯШі Rest**\n> `/descansar dormir` ¬Ј `/descansar despertar` ¬Ј `/descansar estado` вАФ energy comes back by sleeping; a better bed (sleeping bag, mattress, flat, houseвА¶ or a hotel) rests you more. 24 h without sleep: fatigue\n**рЯТЉ Work**\n> `/trabajo lista` ¬Ј `/trabajo elegir` ¬Ј `/trabajo currar` ¬Ј `/entrenar` (stats) ¬Ј `/estudiar` (salary bonus)\n> **рЯУИ Promotions:** start at the bottom and climb by working: `/trabajo ascender` once you meet seniority, studies, stat and price. `/trabajo carrera` shows what you're missing.\n**рЯЫТ Shop**\n> `/tienda` ¬Ј `/comprar` ¬Ј `/inventario ver` ¬Ј `/inventario usar` ¬Ј `/inventario vender`\n**рЯМ≥ Upgrades**\n> `/mejoras` (tree) ¬Ј `/mejorar`\n**вЬ® Passives**\n> `/pasivos ver` ¬Ј `/pasivos equipar` ¬Ј `/pasivos quitar`\n> Your gear and vehicles are **not just for show** any more: they grant permanent bonuses. Slot what you own and the bonus applies on its own вАФ the item is never consumed.\n> **рЯФУ Slots:** you start with **1**. The 2nd at **level 10**, the 3rd at **25**, the 4th at **50** вАФ same milestones as your ranks, so they unlock together.\n> **вЪЩпЄП What they boost:** рЯТЉ pay ¬Ј вП±пЄП work cooldown ¬Ј в≠Р XP ¬Ј вЪ° energy ¬Ј вЫПпЄП minerals and pick durability ¬Ј вЪФпЄП attack, defence and crits.\n> **рЯУИ Caps:** every type has a ceiling (e.g. +30 % pay). Once you hit it, `/pasivos ver` says so and a fifth piece of the same kind adds nothing вАФ spread them out.\n> **вЪ†пЄП Heads up:** a bonus only counts **while you own the item**. Sell it, gift it or list it on `/mercado` and the slot stays but **stops counting** (`/pasivos ver` flags it).\n> Start cheap: рЯІҐ `gorra` (200) or рЯОТ `mochila` (400) already help. Finish rich: рЯЫЂ `jet`, рЯЫ•пЄП `yate`, рЯЪА `cohete`. **Nobody gets everything вАФ pick your build.**\n**вЫПпЄП Mining & smithing**\n> `/minar` ¬Ј `/reparar` ¬Ј `/craftear` ¬Ј `/recetas`\n**рЯОБ Chests**\n> `/cofres` (drop rates) ¬Ј `/abrir`\n**рЯ§Э Between players**\n> `/regalar` ¬Ј `/regalar-item` ¬Ј `/trueque` ¬Ј `/robar` ¬Ј `/mercado ver` ¬Ј `/mercado publicar` ¬Ј `/mercado comprar` ¬Ј `/mercado retirar`\n**рЯП¶ Bank**\n> `/banco ver` ¬Ј `/banco depositar` ¬Ј `/banco retirar` ¬Ј `/banco prestamo` ¬Ј `/banco pagar`\n**рЯП∞ Guilds**\n> `/gremio crear` ¬Ј `/gremio ver` ¬Ј `/gremio add` ¬Ј `/gremio kick` ¬Ј `/gremio salir` ¬Ј `/gremio disolver`\n**рЯО∞ Casino** (fiction)\n> `/casino coinflip` ¬Ј `/casino dado` ¬Ј `/casino ruleta` ¬Ј `/casino duelo`\n**рЯУИ Market** (fiction)\n> `/bolsa ver` ¬Ј `/bolsa invertir` ¬Ј `/bolsa vender` ¬Ј `/bolsa cartera`\n**вЪФпЄП Adventure**\n> `/equipar` ¬Ј `/mundos` ¬Ј `/monstruos` ¬Ј `/pelear` ¬Ј `/mazmorra` ¬Ј `/misiones` (see вЪФпЄПгГїcombate)

