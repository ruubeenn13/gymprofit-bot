# Combat channel intro
intro.combate.titulo=⚔️ Combat — Worlds and monsters
intro.combate.desc=Gear up for adventure.\n**⚔️ Equipment**\n> `/equipar <item>` · `/desequipar <slot>` — your combat power shows in `/perfil`.\n**🗺️ Worlds**\n> `/mundos` — check your progress; beat a world's boss to open the next.\n**📖 Bestiary**\n> `/monstruos <world>` — every monster by difficulty, with power, HP, rewards and loot.\n**⚔️ Fight**\n> `/pelear <world>` — turn-based battle: pick a rival and fight with buttons (Attack/Defend/Skill/Item/Flee).\n**🏰 Dungeons**\n> `/mazmorra <dungeon>` — waves of monsters + boss, no healing between them; bonus on clear.\n**🎯 Missions**\n> `/misiones` — hunt objectives that complete as you fight (reward on victory).

