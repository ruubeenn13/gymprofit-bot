# --- Privacy (GDPR) ---
comando.privacidad.familia=Your data: what we store, download it or delete it
comando.privacidad.descripcion=What data the bot stores and how to exercise your rights
privacidad.titulo=Privacy and your data
privacidad.texto=рЯФТ **What GymProBot stores**\n> Only your **Discord ID** (a public identifier) and community data: XP, level, coins, streak, language and, if you have been moderated, your warnings/sanctions. We do **not** store your real name, email or password.\n\nрЯЫ°пЄП **How we protect it**\n> Encrypted in transit and at rest; sanction reasons are stored **encrypted**. Minimal data and automatic deletion of old records.\n\nвЪЦпЄП **Your rights**\n> `/privacidad exportar` вАФ download everything we store about you.\n> `/privacidad borrar` вАФ delete all your data from the bot.\n\nLegal basis: legitimate interest to run and gamify the community.
comando.misdatos.descripcion=Download everything the bot stores about you (GDPR)
misdatos.texto=рЯУД Here is all your data stored in the bot. Only you can see this message.
comando.borrarmisdatos.descripcion=Delete all your data from the bot (GDPR, irreversible)
