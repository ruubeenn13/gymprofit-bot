# --- Pinned help messages (posted by /setup) ---
intro.empieza.titulo=Start here!
intro.empieza.desc=👋 Welcome to **GymProFit**! The basics to get started:\n\n**1.** Read the 📜 rules.\n**2.** Check 🗺️ how-it-works (XP, levels and commands).\n**3.** Introduce yourself in 👋 introductions.\n**4.** Pick your goal in the welcome message to grab your role.\n**5.** Chat in 💬 general and use commands in 🤖 bot-commands.\n\nGlad to have you here! 💪
intro.reglas.titulo=Community rules
intro.reglas.desc=For this to work, please respect these rules:\n\n**1.** Always be respectful. No insults, harassment or body-shaming.\n**2.** No spam, ads or shady links.\n**3.** Use each channel for its topic.\n**4.** No NSFW or illegal content.\n**5.** This is not a substitute for a professional: be careful with risky routines or diets.\n**6.** Listen to the staff.\n\nBreaking these can lead to a warn, mute or ban. 🛡️
intro.como.titulo=How GymProBot works
intro.como.desc=**GymProBot** gamifies the community:\n\n🔸 **XP and levels:** earn XP by chatting (once/min). Check your level with /nivel and the leaderboard with /top.\n🔸 **Goals:** pick yours in the welcome to grab a role (💪🏃⚖️🌟).\n🔸 Quote and exercise of the day, trivia, challenges and economy are coming.\n🔸 Use commands in 🤖 bot-commands to keep the chat clean.\n\nType / to see all commands.
intro.faq.titulo=Frequently asked questions
intro.faq.desc=**How do I level up?** By chatting: you earn XP every minute of activity.\n**How do I change my goal?** Pick again in 👋 welcome.\n**Is the bot in my language?** Yes: it replies in Spanish or English based on your Discord client.\n**Issues or questions?** Open a ticket in 🎫 support.\n\nMissing one? Ask in 💬 general.
intro.redes.titulo=Our socials
intro.redes.desc=📱 Follow us so you do not miss a thing.\n\n*(Staff will post the official GymProFit and team socials here.)*
intro.general.titulo=General chat
intro.general.desc=💬 The community's main chat. Introduce yourself, share your day and meet people.\n\nGood vibes always. Bot commands work best in 🤖 bot-commands. 💪
intro.presentaciones.titulo=Introduce yourself
intro.presentaciones.desc=👋 Tell us who you are! An easy format:\n\n**Name/nickname:**\n**Goal:** (strength, cardio, weight loss, general)\n**Time training:**\n**Something about you:**\n\nAnd welcome whoever comes after you! 🤝
intro.comandos.titulo=Bot commands
intro.comandos.desc=🤖 Use bot commands here to keep other channels clean.\n\nTry /nivel and /top, and type / to see everything. There is a small slowmode to keep things tidy.
intro.soporte.titulo=Support
intro.soporte.desc=🎫 Need help or to talk to the staff privately?\n\nSoon you will be able to open a **ticket** here with a button. Meanwhile, describe your issue and the staff will help you.
