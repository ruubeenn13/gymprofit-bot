# Combat channel intro
intro.combate.titulo=вҡ”пёҸ Combat вҖ” Worlds and monsters
intro.combate.desc=Gear up for adventure.\n**вҡ”пёҸ Equipment**\n> `/equipar <item>` В· `/desequipar <slot>` вҖ” your combat power shows in `/perfil`.\n**рҹ—әпёҸ Worlds**\n> `/mundos` вҖ” check your progress; beat a world's boss to open the next.\n**рҹ“– Bestiary**\n> `/monstruos <world>` вҖ” every monster by difficulty, with power, HP, rewards and loot.\n\nрҹ”ң Coming soon: turn-based fights against these monsters.
