# Combat channel intro
intro.combate.titulo=тЪФя╕П Combat тАФ Worlds and monsters
intro.combate.desc=Gear up for adventure.\n**тЪФя╕П Equipment**\n> `/equipar <item>` ┬╖ `/desequipar <slot>` тАФ your combat power shows in `/perfil`.\n**ЁЯЧ║я╕П Worlds**\n> `/mundos` тАФ check your progress; beat a world's boss to open the next.\n**ЁЯУЦ Bestiary**\n> `/monstruos <world>` тАФ every monster by difficulty, with power, HP, rewards and loot.\n**тЪФя╕П Fight**\n> `/pelear <world>` тАФ turn-based battle: pick a rival and fight with buttons (Attack/Defend/Skill/Item/Flee).\n**ЁЯП░ Dungeons**\n> `/mazmorra <dungeon>` тАФ waves of monsters + boss, no healing between them; bonus on clear.\n**ЁЯОп Missions**\n> `/misiones` тАФ hunt objectives that complete as you fight (reward on victory).

