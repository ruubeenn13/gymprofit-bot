# --- Privacy (GDPR) ---
comando.privacidad.familia=Your data: what we store, download it or delete it
comando.privacidad.descripcion=What data the bot stores and how to exercise your rights
privacidad.titulo=Privacy and your data
privacidad.texto=ЁЯФТ **What GymProBot stores**\n> Only your **Discord ID** (a public identifier) and community data: XP, level, coins, streak, language and, if you have been moderated, your warnings/sanctions. We do **not** store your real name, email or password.\n\nЁЯЫбя╕П **How we protect it**\n> Encrypted in transit and at rest; sanction reasons are stored **encrypted**. Minimal data and automatic deletion of old records.\n\nтЪЦя╕П **Your rights**\n> `/privacidad exportar` тАФ download everything we store about you.\n> `/privacidad borrar` тАФ delete all your data from the bot.\n\nLegal basis: legitimate interest to run and gamify the community.
comando.misdatos.descripcion=Download everything the bot stores about you (GDPR)
misdatos.texto=ЁЯУД Here is all your data stored in the bot. Only you can see this message.
comando.borrarmisdatos.descripcion=Delete all your data from the bot (GDPR, irreversible)
borrar.aviso.titulo=Delete all your data?
borrar.aviso.texto=тЪая╕П This permanently deletes your XP, level, coins, streak and your moderation history in the bot. **This cannot be undone.** Press the button to confirm.
borrar.boton=Yes, delete my data
borrar.hecho.titulo=Data deleted
