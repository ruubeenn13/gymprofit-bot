intro.combate.titulo=вҡ”пёҸ Combat вҖ” Worlds and monsters
intro.combate.desc=Gear up for adventure.\n**вҡ”пёҸ Equipment**\n> `/equipar <item>` В· `/desequipar <slot>` вҖ” your combat power shows in `/perfil`.\n**рҹ—әпёҸ Worlds**\n> `/mundos` вҖ” check your progress; beat a world's boss to open the next.\n**рҹ“– Bestiary**\n> `/monstruos <world>` вҖ” every monster by difficulty, with power, HP, rewards and loot.\n**вҡ”пёҸ Fight**\n> `/pelear <world>` вҖ” turn-based battle: pick a rival and fight with buttons (Attack/Defend/Skill/Item/Flee).\n**рҹҸ° Dungeons**\n> `/mazmorra <dungeon>` вҖ” waves of monsters + boss, no healing between them; bonus on clear.\n**рҹҺҜ Missions**\n> `/misiones` вҖ” hunt objectives that complete as you fight (reward on victory).

