# --- Pinned help messages (posted by /setup) ---
intro.empieza.titulo=Start here!
intro.empieza.desc=рҹ‘Ӣ Welcome to **GymProFit**, your gamified fitness community!\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nFollow these steps to get started:\n\n**1пёҸвғЈ В· Read the rules** вҶ’ рҹ“ң rules\n**2пёҸвғЈ В· Learn the bot** вҶ’ рҹ—әпёҸ how-it-works (XP, levels and commands)\n**3пёҸвғЈ В· Grab your roles** вҶ’ рҹҺӯ roles (goal + notifications)\n**4пёҸвғЈ В· Introduce yourself** вҶ’ рҹ‘Ӣ introductions\n**5пёҸвғЈ В· Join in** вҶ’ рҹ’¬ general В· commands in рҹӨ– bot-commands\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹ’Ә You earn **XP** just by taking part and level up. Glad to have you here!
intro.reglas.titulo=Community rules
intro.reglas.desc=To keep this a good place for everyone, follow these rules. By taking part, you accept them.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n**рҹӨқ Respect**\n> **1.** Always be respectful. No insults, harassment, racism, homophobia or body-shaming.\n> **2.** No drama, baiting or mention spam.\n\n**рҹ§№ Content**\n> **3.** No spam, ads or self-promo without staff permission.\n> **4.** No NSFW, gore, illegal content or anything promoting dangerous habits.\n> **5.** Use each channel for its topic (see рҹ—әпёҸ how-it-works).\n\n**рҹҘ— Health & fitness**\n> **6.** This is **not** a substitute for a doctor or professional. No fad diets or substances.\n> **7.** We motivate, we do not judge: respect everyone's level and body.\n\n**рҹ”’ Safety**\n> **8.** Do not share personal data, yours or others'.\n> **9.** Do not impersonate anyone or the staff.\n\n**рҹӣЎпёҸ Staff**\n> **10.** Follow staff instructions.\n> **11.** Got an issue? Open a ticket in рҹҺ« support; do not make a scene in public.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nвҡ пёҸ Breaking the rules can lead to **warning вҶ’ temporary mute вҶ’ kick or ban**, depending on severity. рҹ’Ә
intro.como.titulo=How GymProBot works
intro.como.desc=**GymProBot** makes the community more fun. Here is what you can do:\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n**вӯҗ XP and levels**\n> Earn XP by chatting (once per minute). Check your level with `/nivel` and compete in `/top`.\n\n**рҹҺҜ Goals and roles**\n> Grab your goal (рҹ’Ә Strength В· рҹҸғ Cardio В· вҡ–пёҸ Weight loss В· рҹҢҹ General) in рҹҺӯ roles or in the welcome.\n\n**рҹ”” Notifications**\n> Enable рҹ“Ј Announcements and рҹҺҜ Challenges in рҹҺӯ roles so you do not miss a thing.\n\n**рҹӨ– Commands**\n> Type `/` to see them all. Use them in рҹӨ– bot-commands to keep the rest clean.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹ”ң Coming soon: quote and exercise of the day, trivia, challenges, economy and much more.
intro.faq.titulo=Frequently asked questions
intro.faq.desc=**вқ“ How do I level up?**\n> By chatting: you earn XP every minute of activity. Check it with `/nivel`.\n\n**вқ“ How do I grab or change my goal?**\n> In рҹҺӯ roles or in рҹ‘Ӣ welcome.\n\n**вқ“ Does the bot speak my language?**\n> Yes: it replies in Spanish or English based on your Discord client.\n\n**вқ“ How do I contact the staff?**\n> Open a ticket in рҹҺ« support.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nStill have a question? Ask in рҹ’¬ general or вқ“ questions.
intro.redes.titulo=Our socials
intro.redes.desc=рҹ“ұ Follow us so you do not miss a thing.\n\n*(Staff will post the official GymProFit and team socials here.)*
intro.general.titulo=General chat
intro.general.desc=рҹ’¬ The community's main chat. Introduce yourself, share your day and meet people.\n\nGood vibes always. Bot commands work best in рҹӨ– bot-commands. рҹ’Ә
intro.presentaciones.titulo=Introduce yourself
intro.presentaciones.desc=рҹ‘Ӣ Tell us who you are! An easy format:\n\n**Name/nickname:**\n**Goal:** (strength, cardio, weight loss, general)\n**Time training:**\n**Something about you:**\n\nAnd welcome whoever comes after you! рҹӨқ
intro.comandos.titulo=Bot commands
intro.comandos.desc=рҹӨ– Use bot commands here to keep other channels clean.\n\nTry /nivel and /top, and type / to see everything. There is a small slowmode to keep things tidy.
intro.soporte.titulo=Support
intro.soporte.desc=рҹҺ« Need help or to talk to the staff privately?\n\nSoon you will be able to open a **ticket** here with a button. Meanwhile, describe your issue and the staff will help you.
intro.anuncios.titulo=Announcements
intro.anuncios.desc=рҹ“Ј Important server and GymProFit news goes here. Grab the рҹ“Ј Avisos role in рҹҺӯ roles so you do not miss a thing.
intro.eventos.titulo=Events
intro.eventos.desc=рҹ“… Meetups, live streams, live challenges and special community events. Grab the рҹ“… Eventos role in рҹҺӯ roles (or during onboarding) so we can ping you for each one.
intro.sorteos.titulo=Giveaways
intro.sorteos.desc=рҹҺҒ Giveaways and prizes for the community. Grab the рҹҺҒ Sorteos role in рҹҺӯ roles (or during onboarding) so you never miss one. Each giveaway explains how to enter.
intro.progresos.titulo=Share your progress
intro.progresos.desc=рҹ“Ҳ Post your progress, PRs and wins. Mutual support motivates. No judging or comparing!
intro.nutricion.titulo=Nutrition
intro.nutricion.desc=рҹҚҺ Food questions, recipes and ideas. Remember: this is not a substitute for a professional.
intro.rutinas.titulo=Routines
intro.rutinas.desc=рҹ“ҡ Share and discuss training routines. State your level and goal so it helps others.
intro.dudas.titulo=Questions
intro.dudas.desc=вқ“ Ask anything about training or nutrition. The community and staff will help.
intro.proximamente.titulo=Coming soon
intro.proximamente.desc=рҹ”’ This channel will unlock in an upcoming GymProBot phase. Very soon! рҹ’Ә
intro.simulador.titulo=рҹҺ® Life simulator вҖ” How to play
intro.simulador.desc=Welcome to the GymProFit **life simulator**: a **fiction** RPG where you build a life on the server. Everything runs on **virtual coins** (no real-world value, not buyable with money).\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n**рҹ§Қ Your character**\n> You have attributes (рҹ’Ә Strength, рҹҸғ Stamina, рҹ—ЈпёҸ Charisma), вҡЎ energy and вқӨпёҸ health. Check it with **/perfil**.\n\n**рҹӘҷ Money**\n> Earn coins with **/daily** (daily reward, builds your streak), working and playing. Check your balance with **/balance**.\n\n**рҹ”ң Coming (in phases)**\n> рҹ’ј Pick a **job** and work (`/work`) В· рҹӣ’ **shop** of items with effects В· рҹ’№ player **market** В· рҹҸҰ **bank** В· рҹҸ° **guilds** and alliances В· рҹҺ° games of chance.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹҗў **Slow progression on purpose:** growing takes effort. No getting rich in an afternoon; the fun is the long game.
intro.economia.titulo=рҹ’° Economy
intro.economia.desc=Live your life on the server here. Commands:\n**рҹ‘Ө Character**\n> `/perfil` В· `/balance` В· `/daily` (daily reward + streak)\n**рҹ’ј Work**\n> `/trabajos` В· `/elegir-trabajo` В· `/work` В· `/entrenar` (raise stats)\n**рҹӣ’ Shop**\n> `/tienda` В· `/comprar` В· `/inventario` В· `/usar` (consumables)\n**рҹҢі Upgrades**\n> `/mejoras` (tree) В· `/mejorar`\n**вҡ”пёҸ Adventure**\n> `/equipar` В· `/mundos` В· `/monstruos` (see вҡ”пёҸгғ»combate)\n\nрҹ”ң Soon: turn-based fights, mining, market, guilds and more.

