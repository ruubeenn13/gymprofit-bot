# --- Privacy (GDPR) ---
comando.privacidad.descripcion=What data the bot stores and how to exercise your rights
privacidad.titulo=Privacy and your data
privacidad.texto=рЯФТ **What GymProBot stores**\n> Only your **Discord ID** (a public identifier) and community data: XP, level, coins, streak, language and, if you have been moderated, your warnings/sanctions. We do **not** store your real name, email or password.\n\nрЯЫ°пЄП **How we protect it**\n> Encrypted in transit and at rest; sanction reasons are stored **encrypted**. Minimal data and automatic deletion of old records.\n\nвЪЦпЄП **Your rights**\n> `/mis-datos` вАФ download everything we store about you.\n> `/borrar-mis-datos` вАФ delete all your data from the bot.\n\nLegal basis: legitimate interest to run and gamify the community.
comando.misdatos.descripcion=Download everything the bot stores about you (GDPR)
misdatos.texto=рЯУД Here is all your data stored in the bot. Only you can see this message.
comando.borrarmisdatos.descripcion=Delete all your data from the bot (GDPR, irreversible)
borrar.aviso.titulo=Delete all your data?
borrar.aviso.texto=вЪ†пЄП This permanently deletes your XP, level, coins, streak and your moderation history in the bot. **This cannot be undone.** Press the button to confirm.
borrar.boton=Yes, delete my data
borrar.hecho.titulo=Data deleted
borrar.hecho.texto=вЬЕ All your data has been removed from the bot. If you participate again, a fresh profile will be created.

