# --- Pinned help messages (posted by /setup) ---
intro.empieza.titulo=Start here!
intro.empieza.desc=рџ‘‹ Welcome to **GymProFit**, your gamified fitness community!\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nFollow these steps to get started:\n\n**1пёЏвѓЈ В· Read the rules** в†’ рџ“њ rules\n**2пёЏвѓЈ В· Learn the bot** в†’ рџ—єпёЏ how-it-works (XP, levels and commands)\n**3пёЏвѓЈ В· Grab your roles** в†’ рџЋ­ roles (goal + notifications)\n**4пёЏвѓЈ В· Introduce yourself** в†’ рџ‘‹ introductions\n**5пёЏвѓЈ В· Join in** в†’ рџ’¬ general В· commands in рџ¤– bot-commands\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ’Є You earn **XP** just by taking part and level up. Glad to have you here!
intro.reglas.titulo=Community rules
intro.reglas.desc=To keep this a good place for everyone, follow these rules. By taking part, you accept them.\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n**рџ¤ќ Respect**\n> **1.** Always be respectful. No insults, harassment, racism, homophobia or body-shaming.\n> **2.** No drama, baiting or mention spam.\n\n**рџ§№ Content**\n> **3.** No spam, ads or self-promo without staff permission.\n> **4.** No NSFW, gore, illegal content or anything promoting dangerous habits.\n> **5.** Use each channel for its topic (see рџ—єпёЏ how-it-works).\n\n**рџҐ— Health & fitness**\n> **6.** This is **not** a substitute for a doctor or professional. No fad diets or substances.\n> **7.** We motivate, we do not judge: respect everyone's level and body.\n\n**рџ”’ Safety**\n> **8.** Do not share personal data, yours or others'.\n> **9.** Do not impersonate anyone or the staff.\n\n**рџ›ЎпёЏ Staff**\n> **10.** Follow staff instructions.\n> **11.** Got an issue? Open a ticket in рџЋ« support; do not make a scene in public.\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nвљ пёЏ Breaking the rules can lead to **warning в†’ temporary mute в†’ kick or ban**, depending on severity. рџ’Є
intro.como.titulo=How GymProBot works
intro.como.desc=**GymProBot** makes the community more fun. Here is what you can do:\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n**в­ђ XP and levels**\n> Earn XP by chatting (once per minute). Check your level with `/nivel` and compete in `/top`.\n\n**рџЋЇ Goals and roles**\n> Grab your goal (рџ’Є Strength В· рџЏѓ Cardio В· вљ–пёЏ Weight loss В· рџЊџ General) in рџЋ­ roles or in the welcome.\n\n**рџ”” Notifications**\n> Enable рџ“Ј Announcements and рџЋЇ Challenges in рџЋ­ roles so you do not miss a thing.\n\n**рџ¤– Commands**\n> Type `/` to see them all. Use them in рџ¤– bot-commands to keep the rest clean.\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ”њ Coming soon: quote and exercise of the day, trivia, challenges, economy and much more.
intro.faq.titulo=Frequently asked questions
intro.faq.desc=**вќ“ How do I level up?**\n> By chatting: you earn XP every minute of activity. Check it with `/nivel`.\n\n**вќ“ How do I grab or change my goal?**\n> In рџЋ­ roles or in рџ‘‹ welcome.\n\n**вќ“ Does the bot speak my language?**\n> Yes: it replies in Spanish or English based on your Discord client.\n\n**вќ“ How do I contact the staff?**\n> Open a ticket in рџЋ« support.\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nStill have a question? Ask in рџ’¬ general or вќ“ questions.
intro.redes.titulo=Our socials
intro.redes.desc=рџ“± Follow us so you do not miss a thing.\n\n*(Staff will post the official GymProFit and team socials here.)*
intro.general.titulo=General chat
intro.general.desc=рџ’¬ The community's main chat. Introduce yourself, share your day and meet people.\n\nGood vibes always. Bot commands work best in рџ¤– bot-commands. рџ’Є
intro.presentaciones.titulo=Introduce yourself
intro.presentaciones.desc=рџ‘‹ Tell us who you are! An easy format:\n\n**Name/nickname:**\n**Goal:** (strength, cardio, weight loss, general)\n**Time training:**\n**Something about you:**\n\nAnd welcome whoever comes after you! рџ¤ќ
