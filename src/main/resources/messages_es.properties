panel.roles.titulo=Consigue tus roles
panel.roles.desc=🎭 Elige tus roles aquí abajo:\n\n**Objetivo** — tu meta de entreno (elige uno).\n**Notificaciones** — recibe avisos de anuncios y retos.\n\nPuedes cambiarlos cuando quieras.
