privacidad.texto=рҹ”’ **QuГ© guarda GymProBot**\n> Solo tu **ID de Discord** (identificador pГәblico) y datos de la comunidad: XP, nivel, monedas, racha, idioma y, si te han moderado, tus avisos/sanciones. **No** guardamos tu nombre real, email ni tu contraseГұa.\n\nрҹӣЎпёҸ **CГіmo lo protegemos**\n> Cifrado en trГЎnsito y en reposo; los motivos de sanciГіn se guardan **cifrados**. Datos mГӯnimos y borrado automГЎtico de lo antiguo.\n\nвҡ–пёҸ **Tus derechos**\n> `/privacidad exportar` вҖ” descarga todo lo que guardamos de ti.\n> `/privacidad borrar` вҖ” borra todos tus datos del bot.\n\nBase legal: interГ©s legГӯtimo para gestionar y gamificar la comunidad.
