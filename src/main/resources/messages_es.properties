# Intro del canal de combate
intro.combate.titulo=⚔️ Combate — Mundos y monstruos
intro.combate.desc=Prepárate para la aventura.\n**⚔️ Equipo**\n> `/equipar <item>` · `/desequipar <ranura>` — tu poder de combate sube en `/perfil ver`.\n**🗺️ Mundos**\n> `/mundos` — mira tu progreso; derrota al jefe de un mundo para abrir el siguiente.\n**📖 Bestiario**\n> `/monstruos <mundo>` — todos los monstruos por dificultad, con poder, vida, recompensas y botín.\n**⚔️ Pelea**\n> `/pelear <mundo>` — batalla por turnos: elige rival y lucha con botones (Atacar/Defender/Habilidad/Objeto/Huir).\n**🏰 Mazmorras**\n> `/mazmorra <mazmorra>` — oleadas de monstruos + jefe, sin curarte entre ellas; bonus al completarla.\n**🎯 Misiones**\n> `/misiones` — objetivos de caza que se completan al pelear (recompensa al ganar).

