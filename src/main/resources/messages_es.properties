intro.combate.desc=PrepГЎrate para la aventura.\n**вҡ”пёҸ Equipo**\n> `/equipar <item>` В· `/desequipar <ranura>` вҖ” tu poder de combate sube en `/perfil`.\n**рҹ—әпёҸ Mundos**\n> `/mundos` вҖ” mira tu progreso; derrota al jefe de un mundo para abrir el siguiente.\n**рҹ“– Bestiario**\n> `/monstruos <mundo>` вҖ” todos los monstruos por dificultad, con poder, vida, recompensas y botГӯn.\n**вҡ”пёҸ Pelea**\n> `/pelear <mundo>` вҖ” batalla por turnos: elige rival y lucha con botones (Atacar/Defender/Objeto/Huir).

