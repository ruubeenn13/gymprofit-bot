intro.simulador.titulo=рҹҺ® Simulador de vida вҖ” CГіmo se juega
intro.simulador.desc=Bienvenid@ al **simulador de vida** de GymProFit: un RPG de **ficciГіn** donde construyes una vida en el servidor. Todo con **coins virtuales** (no tienen valor real ni se compran con dinero).\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n**рҹ§Қ Personaje y progresiГіn**\n> Atributos (рҹ’ӘрҹҸғрҹ—ЈпёҸ), вҡЎ energГӯa y вқӨпёҸ salud. **/perfil ver** В· **/perfil balance** В· **/perfil insignias** В· **/rank** В· **/daily** В· **/entrenar** В· **/estudiar** В· **/descansar**.\n**рҹҳҙ Descanso**\n> La energГӯa se recupera **durmiendo**: **/descansar dormir** В· **/descansar despertar** В· **/descansar estado**. Con mejor cama descansas mejor (en el suelo no llegas a 100).\n**рҹ’ј Trabajo y tienda**\n> **/trabajo lista** В· **/trabajo elegir** В· **/trabajo currar** В· **/tienda** В· **/comprar** В· **/inventario ver** В· **/inventario usar** В· **/inventario vender** В· **/mejoras**.\n**вҡ”пёҸ Combate**\n> **/mundos** В· **/monstruos** В· **/pelear** В· **/mazmorra** В· **/misiones** В· **/equipar** В· **/encantar**.\n**вӣҸпёҸ MinerГӯa y herrerГӯa**\n> **/minar** В· **/reparar** В· **/recetas** В· **/craftear**.\n**рҹҺҒрҹӨқ Cofres y jugadores**\n> **/cofres** В· **/abrir** В· **/regalar** В· **/trueque** В· **/robar** В· **/mercado**.\n**рҹҸҰрҹҺ°рҹ“Ҳ Banca y azar** (ficciГіn)\n> **/banco** В· **/casino** В· **/bolsa**.\n**рҹҸ° Social**\n> **/gremio** (grupos con canal privado).\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹҗў **ProgresiГіn lenta a propГіsito:** crecer cuesta. El chiste es el largo plazo. Empieza en рҹ’°гғ»economГӯa.
intro.economia.titulo=рҹ’° EconomГӯa
intro.economia.desc=AquГӯ vives tu vida en el servidor. Comandos:\n**рҹ‘Ө Personaje**\n> `/perfil ver` В· `/perfil balance` В· `/perfil insignias` В· `/daily` (recompensa diaria + racha) В· `/rank` (tarjeta)\n**рҹҳҙ Descanso**\n> `/descansar dormir` В· `/descansar despertar` В· `/descansar estado` вҖ” la energГӯa se recupera durmiendo; con mejor cama (saco, colchГіn, piso, casaвҖҰ o un hotel) descansas mejor. 24 h sin dormir: fatiga\n**рҹ’ј Trabajo**\n> `/trabajo lista` В· `/trabajo elegir` В· `/trabajo currar` В· `/entrenar` (stats) В· `/estudiar` (bono al sueldo)\n> **рҹ“Ҳ Ascensos:** se empieza por abajo y se sube currando: `/trabajo ascender` cuando cumplas antigГјedad, estudios, stat y precio. `/trabajo carrera` te dice quГ© te falta.\n**рҹӣ’ Tienda**\n> `/tienda` В· `/comprar` В· `/inventario ver` В· `/inventario usar` В· `/inventario vender`\n**рҹҢі Mejoras**\n> `/mejoras` (ГЎrbol) В· `/mejorar`\n**вңЁ Pasivos**\n> `/pasivos ver` В· `/pasivos equipar` В· `/pasivos quitar`\n> Tu equipo y tus vehГӯculos **ya no son solo decoraciГіn**: dan bonos permanentes. Equipa lo que tengas en tus **ranuras** y el bono se aplica solo, sin gastar el Гӯtem.\n> **рҹ”“ Ranuras:** empiezas con **1**. La 2.ВӘ en el **nivel 10**, la 3.ВӘ en el **25** y la 4.ВӘ en el **50** вҖ” las mismas fechas que tus rangos, asГӯ que suben juntas.\n> **вҡҷпёҸ QuГ© mejoran:** рҹ’ј sueldo В· вҸұпёҸ cooldown de currar В· вӯҗ XP В· вҡЎ energГӯa В· вӣҸпёҸ minerales y aguante del pico В· вҡ”пёҸ ataque, defensa y crГӯtico.\n> **рҹ“Ҳ Topes:** cada tipo tiene un techo (p. ej. +30 % de sueldo). Al llegar, `/pasivos ver` te lo marca y la quinta pieza de lo mismo ya no suma: mejor reparte.\n> **вҡ пёҸ Ojo:** el bono cuenta **solo si tienes el Гӯtem**. Si lo vendes, lo regalas o lo pones en `/mercado`, la ranura se queda ahГӯ pero **deja de contar** (y `/pasivos ver` te avisa).\n> Empieza barato: рҹ§ў `gorra` (200) o рҹҺ’ `mochila` (400) ya suman. Termina caro: рҹӣ« `jet`, рҹӣҘпёҸ `yate`, рҹҡҖ `cohete`. **Nadie lo tiene todo вҖ” elige tu build.**\n**вӣҸпёҸ MinerГӯa y herrerГӯa**\n> `/minar` В· `/reparar` В· `/craftear` В· `/recetas`\n**рҹҺҒ Cofres**\n> `/cofres` (probabilidades) В· `/abrir`\n**рҹӨқ Entre jugadores**\n> `/regalar` В· `/regalar-item` В· `/trueque` В· `/robar` В· `/mercado ver` В· `/mercado publicar` В· `/mercado comprar` В· `/mercado retirar`\n**рҹҸҰ Banco**\n> `/banco ver` В· `/banco depositar` В· `/banco retirar` В· `/banco prestamo` В· `/banco pagar`\n**рҹҸ° Gremios**\n> `/gremio crear` В· `/gremio ver` В· `/gremio add` В· `/gremio kick` В· `/gremio salir` В· `/gremio disolver`\n**рҹҺ° Casino** (ficciГіn)\n> `/casino coinflip` В· `/casino dado` В· `/casino ruleta` В· `/casino duelo`\n**рҹ“Ҳ Bolsa** (ficciГіn)\n> `/bolsa ver` В· `/bolsa invertir` В· `/bolsa vender` В· `/bolsa cartera`\n**вҡ”пёҸ Aventura**\n> `/equipar` В· `/mundos` В· `/monstruos` В· `/pelear` В· `/mazmorra` В· `/misiones` (mira вҡ”пёҸгғ»combate)

