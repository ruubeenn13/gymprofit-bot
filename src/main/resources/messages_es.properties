# --- Privacidad (RGPD) ---
comando.privacidad.familia=Tus datos: qué guardamos, descargarlos o borrarlos
comando.privacidad.descripcion=Qué datos guarda el bot y cómo ejercer tus derechos
privacidad.titulo=Privacidad y tus datos
privacidad.texto=🔒 **Qué guarda GymProBot**\n> Solo tu **ID de Discord** (identificador público) y datos de la comunidad: XP, nivel, monedas, racha, idioma y, si te han moderado, tus avisos/sanciones. **No** guardamos tu nombre real, email ni tu contraseña.\n\n🛡️ **Cómo lo protegemos**\n> Cifrado en tránsito y en reposo; los motivos de sanción se guardan **cifrados**. Datos mínimos y borrado automático de lo antiguo.\n\n⚖️ **Tus derechos**\n> `/privacidad exportar` — descarga todo lo que guardamos de ti.\n> `/privacidad borrar` — borra todos tus datos del bot.\n\nBase legal: interés legítimo para gestionar y gamificar la comunidad.
comando.misdatos.descripcion=Descarga todo lo que el bot guarda de ti (RGPD)
misdatos.texto=📄 Aquí tienes todos tus datos guardados en el bot. Solo tú ves este mensaje.
comando.borrarmisdatos.descripcion=Borra todos tus datos del bot (RGPD, irreversible)
borrar.aviso.titulo=¿Borrar todos tus datos?
borrar.aviso.texto=⚠️ Esto elimina **para siempre** tu XP, nivel, monedas, racha y tu historial de moderación en el bot. **No se puede deshacer.** Pulsa el botón para confirmar.
borrar.boton=Sí, borrar mis datos
borrar.hecho.titulo=Datos borrados
borrar.hecho.texto=✅ Se han eliminado todos tus datos del bot. Si vuelves a participar, se creará un perfil nuevo desde cero.

