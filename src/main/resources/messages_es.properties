# --- Mensajes fijados de ayuda (los publica /setup) ---
intro.empieza.titulo=ВЎEmpieza aquГӯ!
intro.empieza.desc=рҹ‘Ӣ ВЎBienvenid@ a **GymProFit**, tu comunidad fitness gamificada!\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nSigue estos pasos para empezar con buen pie:\n\n**1пёҸвғЈ В· Lee las normas** вҶ’ рҹ“ң reglas\n**2пёҸвғЈ В· Entiende el bot** вҶ’ рҹ—әпёҸ cГіmo-funciona (XP, niveles y comandos)\n**3пёҸвғЈ В· Coge tus roles** вҶ’ рҹҺӯ roles (objetivo + notificaciones)\n**4пёҸвғЈ В· PresГ©ntate** вҶ’ рҹ‘Ӣ presentaciones\n**5пёҸвғЈ В· Participa** вҶ’ рҹ’¬ general В· comandos en рҹӨ– comandos-bot\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹ’Ә Ganas **XP** solo con participar y vas subiendo de nivel. ВЎNos alegra tenerte aquГӯ!
intro.reglas.titulo=Reglas de la comunidad
intro.reglas.desc=Para que esto sea un buen sitio para todos, cumple estas normas. Al participar, las aceptas.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n**рҹӨқ Respeto**\n> **1.** Trato respetuoso siempre. Cero insultos, acoso, racismo, homofobia ni humor a costa del fГӯsico de nadie.\n> **2.** Nada de drama, provocaciones ni spam de menciones.\n\n**рҹ§№ Contenido**\n> **3.** Sin spam, publicidad ni autopromociГіn sin permiso del staff.\n> **4.** Prohibido contenido NSFW, gore, ilegal o que fomente hГЎbitos peligrosos.\n> **5.** Usa cada canal para su tema (ver рҹ—әпёҸ cГіmo-funciona).\n\n**рҹҘ— Salud y fitness**\n> **6.** Esto **no** sustituye a un mГ©dico ni a un profesional. Nada de dietas milagro ni sustancias.\n> **7.** AquГӯ se motiva, no se juzga: respeta el nivel y el cuerpo de cada uno.\n\n**рҹ”’ Seguridad**\n> **8.** No compartas datos personales, tuyos o de otros.\n> **9.** No suplantes a nadie ni al staff.\n\n**рҹӣЎпёҸ Staff**\n> **10.** Sigue las indicaciones del staff.\n> **11.** ВҝUn problema? Abre un ticket en рҹҺ« soporte; no lo montes en pГәblico.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nвҡ пёҸ Saltarse las normas puede acabar en **aviso вҶ’ silencio temporal вҶ’ expulsiГіn o baneo**, segГәn la gravedad. рҹ’Ә
intro.como.titulo=CГіmo funciona GymProBot
intro.como.desc=**GymProBot** hace la comunidad mГЎs divertida. Esto es lo que puedes hacer:\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n**вӯҗ XP y niveles**\n> Ganas XP por participar en el chat (1 vez por minuto). Consulta tu nivel con `/nivel` y compite en `/top`.\n\n**рҹҺҜ Objetivos y roles**\n> Coge tu objetivo (рҹ’Ә Fuerza В· рҹҸғ Cardio В· вҡ–пёҸ PГ©rdida de peso В· рҹҢҹ General) en рҹҺӯ roles o en la bienvenida.\n\n**рҹ”” Notificaciones**\n> ActГӯvate рҹ“Ј Avisos y рҹҺҜ Retos en рҹҺӯ roles para no perderte nada.\n\n**рҹӨ– Comandos**\n> Escribe `/` para verlos todos. Гҡsalos en рҹӨ– comandos-bot para no ensuciar el resto.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹ”ң Muy pronto: frase y ejercicio del dГӯa, trivia, retos, economГӯa y mucho mГЎs.
intro.faq.titulo=Preguntas frecuentes
intro.faq.desc=**вқ“ ВҝCГіmo subo de nivel?**\n> Participando en el chat: ganas XP cada minuto de actividad. MГӯralo con `/nivel`.\n\n**вқ“ ВҝCГіmo cojo o cambio mi objetivo?**\n> En рҹҺӯ roles o en рҹ‘Ӣ bienvenidas.\n\n**вқ“ ВҝEl bot habla mi idioma?**\n> SГӯ: responde en espaГұol o inglГ©s segГәn tu cliente de Discord.\n\n**вқ“ ВҝCГіmo contacto con el staff?**\n> Abre un ticket en рҹҺ« soporte.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nВҝTe queda alguna duda? PregГәntala en рҹ’¬ general o вқ“ dudas.
intro.redes.titulo=Nuestras redes
intro.redes.desc=рҹ“ұ SГӯguenos y no te pierdas nada.\n\n*(El staff irГЎ publicando aquГӯ las redes oficiales de GymProFit y del equipo.)*
intro.general.titulo=Chat general
intro.general.desc=рҹ’¬ El chat principal de la comunidad. PresГ©ntate, comparte tu dГӯa y conoce a la gente.\n\nBuen rollo siempre. Los comandos del bot van mejor en рҹӨ– comandos-bot. рҹ’Ә
intro.presentaciones.titulo=PresГ©ntate
intro.presentaciones.desc=рҹ‘Ӣ ВЎCuГ©ntanos quiГ©n eres! Un formato fГЎcil:\n\n**Nombre/apodo:**\n**Objetivo:** (fuerza, cardio, perder peso, general)\n**Tiempo entrenando:**\n**Algo sobre ti:**\n\nВЎY da la bienvenida a quien llegue despuГ©s! рҹӨқ
intro.comandos.titulo=Comandos del bot
intro.comandos.desc=рҹӨ– Usa aquГӯ los comandos del bot para no llenar otros canales.\n\nPrueba /nivel y /top, y escribe / para ver todo. Hay un pequeГұo slowmode para mantener el orden.
intro.soporte.titulo=Soporte
intro.soporte.desc=рҹҺ« ВҝNecesitas ayuda o hablar con el staff en privado?\n\nEn breve podrГЎs abrir un **ticket** desde aquГӯ con un botГіn. Mientras tanto, describe tu problema y el staff te atenderГЎ.
intro.anuncios.titulo=Anuncios
intro.anuncios.desc=рҹ“Ј AquГӯ van las novedades importantes del servidor y de GymProFit. Coge el rol рҹ“Ј Avisos en рҹҺӯ roles para no perderte nada.
intro.eventos.titulo=Eventos
intro.eventos.desc=рҹ“… Quedadas, directos, retos en vivo y eventos especiales de la comunidad. Coge el rol рҹ“… Eventos en рҹҺӯ roles (o en el onboarding) para que te avisemos de cada uno.
intro.sorteos.titulo=Sorteos
intro.sorteos.desc=рҹҺҒ Sorteos y premios para la comunidad. Coge el rol рҹҺҒ Sorteos en рҹҺӯ roles (o en el onboarding) para no perderte ninguno. Cada sorteo indica cГіmo participar.
intro.progresos.titulo=Comparte tu progreso
intro.progresos.desc=рҹ“Ҳ Sube tus avances, marcas y logros. El apoyo mutuo motiva. ВЎNada de juzgar ni comparar!
intro.nutricion.titulo=NutriciГіn
intro.nutricion.desc=рҹҚҺ Dudas, recetas e ideas de alimentaciГіn. Recuerda: esto no sustituye a un profesional.
intro.rutinas.titulo=Rutinas
intro.rutinas.desc=рҹ“ҡ Comparte y comenta rutinas de entreno. Indica nivel y objetivo para que ayude a otros.
intro.dudas.titulo=Dudas
intro.dudas.desc=вқ“ Pregunta lo que necesites sobre entreno o nutriciГіn. La comunidad y el staff te ayudan.
intro.proximamente.titulo=PrГіximamente
intro.proximamente.desc=рҹ”’ Este canal se activarГЎ en una prГіxima fase de GymProBot. ВЎMuy pronto! рҹ’Ә
intro.simulador.titulo=рҹҺ® Simulador de vida вҖ” CГіmo se juega
intro.simulador.desc=Bienvenid@ al **simulador de vida** de GymProFit: un RPG de **ficciГіn** donde construyes una vida en el servidor. Todo con **coins virtuales** (no tienen valor real ni se compran con dinero).\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n**рҹ§Қ Tu personaje**\n> Tienes atributos (рҹ’Ә Fuerza, рҹҸғ Resistencia, рҹ—ЈпёҸ Carisma), вҡЎ energГӯa y вқӨпёҸ salud. MГӯralo con **/perfil**.\n\n**рҹӘҷ Dinero**\n> Ganas coins con **/daily** (recompensa diaria, sube tu racha), trabajando y jugando. Consulta tu saldo con **/balance**.\n\n**рҹ”ң Lo que viene (por fases)**\n> рҹ’ј Elegir **trabajo** y currar (`/work`) В· рҹӣ’ **tienda** de Гӯtems con efecto В· рҹ’№ **mercado** entre jugadores В· рҹҸҰ **banco** В· рҹҸ° **gremios** y alianzas В· рҹҺ° minijuegos de azar.\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹҗў **ProgresiГіn lenta a propГіsito:** crecer cuesta. Nada de hacerse rico en una tarde; el chiste es el largo plazo.
intro.economia.titulo=рҹ’° EconomГӯa
intro.economia.desc=AquГӯ vives tu vida en el servidor. Comandos:\n**рҹ‘Ө Personaje**\n> `/perfil` В· `/balance` В· `/daily` (recompensa diaria + racha)\n**рҹ’ј Trabajo**\n> `/trabajos` В· `/elegir-trabajo` В· `/work` (currar) В· `/entrenar` (subir stats)\n**рҹӣ’ Tienda**\n> `/tienda` В· `/comprar` В· `/inventario` В· `/usar` (consumibles)\n**рҹҢі Mejoras**\n> `/mejoras` (ГЎrbol) В· `/mejorar`\n**вҡ”пёҸ Aventura**\n> `/equipar` В· `/mundos` В· `/monstruos` (mira вҡ”пёҸгғ»combate)\n\nрҹ”ң Muy pronto: pelea por turnos, minerГӯa, mercado, gremios y mГЎs.

