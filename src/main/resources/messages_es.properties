# ---- Intros de canal añadidas (mensajes fijados de guía) ----
intro.novedadesapp.titulo=📲 Novedades de la app
intro.novedadesapp.desc=Aquí publicamos las actualizaciones y cambios de la app GymProFit. Coge el rol de avisos para enterarte.
intro.memes.titulo=😂 Memes
