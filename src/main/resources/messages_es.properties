# --- Mensajes fijados de ayuda (los publica /setup) ---
intro.empieza.titulo=¡Empieza aquí!
intro.empieza.desc=👋 ¡Bienvenid@ a **GymProFit**, tu comunidad fitness gamificada!\n━━━━━━━━━━━━━━━━━━━━\nSigue estos pasos para empezar con buen pie:\n\n**1️⃣ · Lee las normas** → 📜 reglas\n**2️⃣ · Entiende el bot** → 🗺️ cómo-funciona (XP, niveles y comandos)\n**3️⃣ · Coge tus roles** → 🎭 roles (objetivo + notificaciones)\n**4️⃣ · Preséntate** → 👋 presentaciones\n**5️⃣ · Participa** → 💬 general · comandos en 🤖 comandos-bot\n━━━━━━━━━━━━━━━━━━━━\n💪 Ganas **XP** solo con participar y vas subiendo de nivel. ¡Nos alegra tenerte aquí!
intro.reglas.titulo=Reglas de la comunidad
intro.reglas.desc=Para que esto sea un buen sitio para todos, cumple estas normas. Al participar, las aceptas.\n━━━━━━━━━━━━━━━━━━━━\n**🤝 Respeto**\n> **1.** Trato respetuoso siempre. Cero insultos, acoso, racismo, homofobia ni humor a costa del físico de nadie.\n> **2.** Nada de drama, provocaciones ni spam de menciones.\n\n**🧹 Contenido**\n> **3.** Sin spam, publicidad ni autopromoción sin permiso del staff.\n> **4.** Prohibido contenido NSFW, gore, ilegal o que fomente hábitos peligrosos.\n> **5.** Usa cada canal para su tema (ver 🗺️ cómo-funciona).\n\n**🥗 Salud y fitness**\n> **6.** Esto **no** sustituye a un médico ni a un profesional. Nada de dietas milagro ni sustancias.\n> **7.** Aquí se motiva, no se juzga: respeta el nivel y el cuerpo de cada uno.\n\n**🔒 Seguridad**\n> **8.** No compartas datos personales, tuyos o de otros.\n> **9.** No suplantes a nadie ni al staff.\n\n**🛡️ Staff**\n> **10.** Sigue las indicaciones del staff.\n> **11.** ¿Un problema? Abre un ticket en 🎫 soporte; no lo montes en público.\n━━━━━━━━━━━━━━━━━━━━\n⚠️ Saltarse las normas puede acabar en **aviso → silencio temporal → expulsión o baneo**, según la gravedad. 💪
intro.como.titulo=Cómo funciona GymProBot
intro.como.desc=**GymProBot** hace la comunidad más divertida. Esto es lo que puedes hacer:\n━━━━━━━━━━━━━━━━━━━━\n**⭐ XP y niveles**\n> Ganas XP por participar en el chat (1 vez por minuto). Consulta tu nivel con `/nivel` y compite en `/top`.\n\n**🎯 Objetivos y roles**\n> Coge tu objetivo (💪 Fuerza · 🏃 Cardio · ⚖️ Pérdida de peso · 🌟 General) en 🎭 roles o en la bienvenida.\n\n**🔔 Notificaciones**\n> Actívate 📣 Avisos y 🎯 Retos en 🎭 roles para no perderte nada.\n\n**🤖 Comandos**\n> Escribe `/` para verlos todos. Úsalos en 🤖 comandos-bot para no ensuciar el resto.\n━━━━━━━━━━━━━━━━━━━━\n🔜 Muy pronto: frase y ejercicio del día, trivia, retos, economía y mucho más.
intro.faq.titulo=Preguntas frecuentes
intro.faq.desc=**❓ ¿Cómo subo de nivel?**\n> Participando en el chat: ganas XP cada minuto de actividad. Míralo con `/nivel`.\n\n**❓ ¿Cómo cojo o cambio mi objetivo?**\n> En 🎭 roles o en 👋 bienvenidas.\n\n**❓ ¿El bot habla mi idioma?**\n> Sí: responde en español o inglés según tu cliente de Discord.\n\n**❓ ¿Cómo contacto con el staff?**\n> Abre un ticket en 🎫 soporte.\n━━━━━━━━━━━━━━━━━━━━\n¿Te queda alguna duda? Pregúntala en 💬 general o ❓ dudas.
intro.redes.titulo=Nuestras redes
intro.redes.desc=📱 Síguenos y no te pierdas nada.\n\n*(El staff irá publicando aquí las redes oficiales de GymProFit y del equipo.)*
intro.general.titulo=Chat general
intro.general.desc=💬 El chat principal de la comunidad. Preséntate, comparte tu día y conoce a la gente.\n\nBuen rollo siempre. Los comandos del bot van mejor en 🤖 comandos-bot. 💪
intro.presentaciones.titulo=Preséntate
intro.presentaciones.desc=👋 ¡Cuéntanos quién eres! Un formato fácil:\n\n**Nombre/apodo:**\n**Objetivo:** (fuerza, cardio, perder peso, general)\n**Tiempo entrenando:**\n**Algo sobre ti:**\n\n¡Y da la bienvenida a quien llegue después! 🤝
intro.comandos.titulo=Comandos del bot
intro.comandos.desc=🤖 Usa aquí los comandos del bot para no llenar otros canales.\n\nPrueba /nivel y /top, y escribe / para ver todo. Hay un pequeño slowmode para mantener el orden.
intro.soporte.titulo=Soporte
intro.soporte.desc=🎫 ¿Necesitas ayuda o hablar con el staff en privado?\n\nEn breve podrás abrir un **ticket** desde aquí con un botón. Mientras tanto, describe tu problema y el staff te atenderá.
intro.anuncios.titulo=Anuncios
intro.anuncios.desc=📣 Aquí van las novedades importantes del servidor y de GymProFit. Coge el rol 📣 Avisos en 🎭 roles para no perderte nada.
intro.eventos.titulo=Eventos
intro.eventos.desc=📅 Quedadas, directos, retos en vivo y eventos especiales de la comunidad. Coge el rol 📅 Eventos en 🎭 roles (o en el onboarding) para que te avisemos de cada uno.
intro.sorteos.titulo=Sorteos
intro.sorteos.desc=🎁 Sorteos y premios para la comunidad. Coge el rol 🎁 Sorteos en 🎭 roles (o en el onboarding) para no perderte ninguno. Cada sorteo indica cómo participar.
intro.progresos.titulo=Comparte tu progreso
intro.progresos.desc=📈 Sube tus avances, marcas y logros. El apoyo mutuo motiva. ¡Nada de juzgar ni comparar!
intro.nutricion.titulo=Nutrición
intro.nutricion.desc=🍎 Dudas, recetas e ideas de alimentación. Recuerda: esto no sustituye a un profesional.
intro.rutinas.titulo=Rutinas
intro.rutinas.desc=📚 Comparte y comenta rutinas de entreno. Indica nivel y objetivo para que ayude a otros.
intro.dudas.titulo=Dudas
intro.dudas.desc=❓ Pregunta lo que necesites sobre entreno o nutrición. La comunidad y el staff te ayudan.
intro.proximamente.titulo=Próximamente
intro.proximamente.desc=🔒 Este canal se activará en una próxima fase de GymProBot. ¡Muy pronto! 💪
intro.simulador.titulo=🎮 Simulador de vida — Cómo se juega
intro.simulador.desc=Bienvenid@ al **simulador de vida** de GymProFit: un RPG de **ficción** donde construyes una vida en el servidor. Todo con **coins virtuales** (no tienen valor real ni se compran con dinero).\n━━━━━━━━━━━━━━━━━━━━\n**🧍 Personaje y progresión**\n> Atributos (💪🏃🗣️), ⚡ energía y ❤️ salud. **/perfil ver** · **/perfil balance** · **/perfil insignias** · **/rank** · **/daily** · **/entrenar** · **/estudiar** · **/descansar**.\n**😴 Descanso**\n> La energía se recupera **durmiendo**: **/descansar dormir** · **/descansar despertar** · **/descansar estado**. Con mejor cama descansas mejor (en el suelo no llegas a 100).\n**💼 Trabajo y tienda**\n> **/trabajo lista** · **/trabajo elegir** · **/trabajo currar** · **/tienda** · **/comprar** · **/inventario ver** · **/inventario usar** · **/inventario vender** · **/mejoras**.\n**⚔️ Combate**\n> **/mundos** · **/monstruos** · **/pelear** · **/mazmorra** · **/misiones** · **/equipar** · **/encantar**.\n**⛏️ Minería y herrería**\n> **/minar** · **/reparar** · **/recetas** · **/craftear**.\n**🎁🤝 Cofres y jugadores**\n> **/cofres** · **/abrir** · **/regalar** · **/trueque** · **/robar** · **/mercado**.\n**🏦🎰📈 Banca y azar** (ficción)\n> **/banco** · **/casino** · **/bolsa**.\n**🏰 Social**\n> **/gremio** (grupos con canal privado).\n━━━━━━━━━━━━━━━━━━━━\n🐢 **Progresión lenta a propósito:** crecer cuesta. El chiste es el largo plazo. Empieza en 💰・economía.
intro.economia.titulo=💰 Economía
intro.economia.desc=Aquí vives tu vida en el servidor. Comandos:\n**👤 Personaje**\n> `/perfil ver` · `/perfil balance` · `/perfil insignias` · `/daily` (recompensa diaria + racha) · `/rank` (tarjeta)\n**😴 Descanso**\n> `/descansar dormir` · `/descansar despertar` · `/descansar estado` — la energía se recupera durmiendo; con mejor cama (saco, colchón, piso, casa… o un hotel) descansas mejor. 24 h sin dormir: fatiga\n**💼 Trabajo**\n> `/trabajo lista` · `/trabajo elegir` · `/trabajo currar` · `/entrenar` (stats) · `/estudiar` (bono al sueldo)\n**🛒 Tienda**\n> `/tienda` · `/comprar` · `/inventario ver` · `/inventario usar` · `/inventario vender`\n**🌳 Mejoras**\n> `/mejoras` (árbol) · `/mejorar`\n**⛏️ Minería y herrería**\n> `/minar` · `/reparar` · `/craftear` · `/recetas`\n**🎁 Cofres**\n> `/cofres` (probabilidades) · `/abrir`\n**🤝 Entre jugadores**\n> `/regalar` · `/regalar-item` · `/trueque` · `/robar` · `/mercado ver` · `/mercado publicar` · `/mercado comprar` · `/mercado retirar`\n**🏦 Banco**\n> `/banco ver` · `/banco depositar` · `/banco retirar` · `/banco prestamo` · `/banco pagar`\n**🏰 Gremios**\n> `/gremio crear` · `/gremio ver` · `/gremio add` · `/gremio kick` · `/gremio salir` · `/gremio disolver`\n**🎰 Casino** (ficción)\n> `/casino coinflip` · `/casino dado` · `/casino ruleta` · `/casino duelo`\n**📈 Bolsa** (ficción)\n> `/bolsa ver` · `/bolsa invertir` · `/bolsa vender` · `/bolsa cartera`\n**⚔️ Aventura**\n> `/equipar` · `/mundos` · `/monstruos` · `/pelear` · `/mazmorra` · `/misiones` (mira ⚔️・combate)

